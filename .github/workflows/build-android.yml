name: Generar APK de Android

on:
  workflow_dispatch: # Esto nos permite ejecutarlo manualmente con un botón

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias web
        run: npm install

      - name: Configurar Java (Necesario para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x android/gradlew

      - name: Compilar el APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Subir el APK para descargar
        uses: actions/upload-artifact@v4
        with:
          name: Mi-Simulador-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk